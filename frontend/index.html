<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Logismart - Medellín Optimizer</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; padding: 20px; background: #f4f4f4; border-right: 1px solid #ccc; }
        #map-container { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>🚀 Logismart</h2>
        <p>Optimización de rutas Medellín</p>
        <hr>
        <label>Precisión (Gap): <span id="gapVal">0.15</span></label>
        <input type="range" id="gap" min="0.01" max="0.30" step="0.01" value="0.15" oninput="gapVal.innerText=this.value">
        
        <br><br>
        <label>Tiempo Máx (seg):</label>
        <input type="number" id="time" value="60">
        
        <br><br>
        <button onclick="runOptimization()" style="width: 100%; padding: 10px; cursor: pointer;">OPTIMIZAR</button>
        
        <div id="status" style="margin-top: 20px; font-size: 0.9em; color: #555;"></div>
    </div>

    <div id="map-container">
        <div id="loader" class="loading">⚙️ Calculando ruta en Medellín...</div>
        <iframe id="mapFrame" src=""></iframe>
    </div>

    <script>
        async function runOptimization() {
            const gap = document.getElementById('gap').value;
            const time = document.getElementById('time').value;
            const status = document.getElementById('status');
            const loader = document.getElementById('loader');
            const frame = document.getElementById('mapFrame');

            status.innerText = "Enviando petición al servidor...";
            loader.style.display = "block";
            frame.src = ""; // Limpiar mapa anterior

            try {
                const response = await fetch(`http://127.0.0.1:8000/run-optimization?precision=${gap}&seconds=${time}`);
                const data = await response.json();

                if (data.path) {
                    status.innerHTML = `✅ ¡Éxito!<br>Distancia: ${data.distance} km`;
                    // Cargamos el mapa generado en el iframe (usando la ruta estática)
                    frame.src = `http://127.0.0.1:8000/maps/route_medellin.html?t=${new Date().getTime()}`;
                }
            } catch (error) {
                status.innerText = "❌ Error en el servidor";
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
